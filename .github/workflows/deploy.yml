name: Deploy to tgun.dev

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        env:
          AUTH0_DOMAIN: ${{ secrets.AUTH0_DOMAIN }}
          AUTH0_CLIENT_ID: ${{ secrets.AUTH0_CLIENT_ID }}
          AUTH0_AUDIENCE: ${{ secrets.AUTH0_AUDIENCE }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          envs: AUTH0_DOMAIN,AUTH0_CLIENT_ID,AUTH0_AUDIENCE,GH_TOKEN
          script: |
            set -e

            # Clone on first deploy, pull on subsequent ones
            if [ ! -d ~/topgun ]; then
              git clone https://x-access-token:${GH_TOKEN}@github.com/diogobaltazar/TopGun.git ~/topgun
            fi

            cd ~/topgun
            git fetch origin main
            git checkout main
            git pull origin main

            # Write .env from secrets
            cat > .env <<ENVEOF
            AUTH0_DOMAIN=${AUTH0_DOMAIN}
            AUTH0_CLIENT_ID=${AUTH0_CLIENT_ID}
            AUTH0_AUDIENCE=${AUTH0_AUDIENCE}
            GITHUB_TOKEN=${GH_TOKEN}
            ENVEOF

            docker compose up --build -d
