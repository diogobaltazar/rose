services:
  api:
    container_name: topgun-api
    build:
      context: .
      dockerfile: src/topgun/api/Dockerfile
    volumes:
      - "${HOME}/.claude/logs:/logs:ro"
      - "${HOME}/.claude/projects:/projects:ro"
      - "${HOME}/.claude/sessions:/sessions:ro"
      - "${HOME}/.claude/teams:/teams:ro"
      - "${HOME}/.config/topgun:/topgun-config:ro"
      - "${HOME}:/user-home:ro"
    environment:
      - LOG_DIR=/logs
      - PROJECTS_DIR=/projects
      - SESSIONS_DIR=/sessions
      - TEAMS_DIR=/teams
      - TOPGUN_CONFIG=/topgun-config/config.json
      - WATCHFILES_FORCE_POLLING=true
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
      - USER_HOME=/user-home
      - REDIS_URL=redis://localhost:6379
      - AUTH0_DOMAIN=${AUTH0_DOMAIN:-}
      - AUTH0_CLIENT_ID=${AUTH0_CLIENT_ID:-}
      - AUTH0_CLI_CLIENT_ID=${AUTH0_CLI_CLIENT_ID:-}
      - AUTH0_AUDIENCE=${AUTH0_AUDIENCE:-}
      - GITHUB_CLIENT_ID=${GITHUB_CLIENT_ID:-}
      - GITHUB_CLIENT_SECRET=${GITHUB_CLIENT_SECRET:-}
      - GITHUB_REDIRECT_URI=${GITHUB_REDIRECT_URI:-http://localhost:5101/connect/github/callback}
      - BACKEND_SECRET=${BACKEND_SECRET:-dev-secret-change-in-prod}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:5100}
    ports:
      - "5101:8000"

  web:
    container_name: topgun-web
    build: src/topgun/web
    ports:
      - "5100:80"
    depends_on:
      - api
