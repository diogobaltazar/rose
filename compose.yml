services:
  topgun:
    build:
      context: .
      dockerfile: Dockerfile
    image: topgun:latest
    volumes:
      - type: bind
        source: ${TARGET_PROJECT:-.}
        target: /project
      - type: bind
        source: ${HOME}/.claude
        target: /claude
      - type: bind
        source: ${HOME}/.ssh
        target: /root/.ssh
        read_only: true
      - type: bind
        source: ${HOME}/.config/topgun
        target: /topgun-config
      - type: bind
        source: ${HOME}/.topgun-vault
        target: /topgun-vault
    environment:
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}

  api:
    container_name: topgun-api
    build: src/topgun/api
    volumes:
      - "${HOME}/.claude/logs:/logs:ro"
      - "${HOME}/.claude/projects:/projects:ro"
      - "${HOME}/.claude/sessions:/sessions:ro"
      - "${HOME}/.claude/teams:/teams:ro"
      - "${HOME}/.config/topgun:/topgun-config:ro"
    environment:
      - LOG_DIR=/logs
      - PROJECTS_DIR=/projects
      - SESSIONS_DIR=/sessions
      - TEAMS_DIR=/teams
      - TOPGUN_CONFIG=/topgun-config/config.json
      - WATCHFILES_FORCE_POLLING=true
    ports:
      - "5101:8000"

  web:
    container_name: topgun-web
    build: src/topgun/web
    ports:
      - "5100:80"
    depends_on:
      - api
