[server]
root_url = http://localhost:3000

[security]
allow_embedding = true

[auth.anonymous]
enabled = false

[dashboards]
default_home_dashboard_path = /var/lib/grafana/dashboards/topgun.json

[unified_alerting]
enabled = false

[alerting]
enabled = false

[log]
level = warn

[analytics]
reporting_enabled = false
check_for_updates = false
check_for_plugin_updates = false
