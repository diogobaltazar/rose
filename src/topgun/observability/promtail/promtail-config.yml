server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  # Docker container stdout/stderr via Docker socket
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
        filters:
          - name: label
            values: ["com.docker.compose.project"]
    relabel_configs:
      - source_labels: [__meta_docker_container_name]
        regex: '/(.+)'
        target_label: container
      - source_labels: [__meta_docker_container_label_com_docker_compose_service]
        target_label: service
      - source_labels: [__meta_docker_container_log_stream]
        target_label: stream
      - source_labels: [__meta_docker_container_label_com_docker_compose_project]
        target_label: project
    pipeline_stages:
      - json:
          expressions:
            output: log
            stream: stream
            time: time
      - output:
          source: output

  # Claude Code JSONL event log files (subagent hooks, message events)
  - job_name: claude-events
    static_configs:
      - targets: ['localhost']
        labels:
          job: claude-events
          __path__: /claude-logs/*.jsonl
    pipeline_stages:
      - json:
          expressions:
            ts: ts
            hook: hook
      - labels:
          hook:
      - timestamp:
          source: ts
          format: RFC3339Nano
          action_on_failure: skip
